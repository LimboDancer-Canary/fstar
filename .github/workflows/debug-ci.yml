name: Debug CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore FStarEquations.slnx

      - name: Build
        run: dotnet build FStarEquations.slnx -c Debug --no-restore

      - name: Run unit tests with coverage
        run: |
          dotnet test src/FStarEquationsTests/FStarEquationsTests.csproj \
            -c Debug --no-build --verbosity detailed \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults/UnitTests

      - name: Run component tests with coverage
        run: |
          dotnet test src/FStarEquations.App.Tests/FStarEquations.App.Tests.csproj \
            -c Debug --no-build --verbosity detailed \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults/ComponentTests

      - name: Publish Debug build
        run: dotnet publish src/FStarEquations.App/FStarEquations.App.csproj -c Debug -o output

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: fstar-debug-${{ github.sha }}
          path: output/wwwroot
          retention-days: 3

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 3
